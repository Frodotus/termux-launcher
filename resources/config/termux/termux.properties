allow-external-apps = true

terminal-transcript-rows = 1000

volume-keys = volume

# fullscreen = true

### Cursor blink rate. Values 0, 100 - 2000.
terminal-cursor-blink-rate=600

### Cursor style: block, bar, underline.
terminal-cursor-style=bar

# Synthwave Alpha Color Scheme
# Base colors from https://github.com/vikpe/synthwave-alpha
# Background: #241b30 (dark purple)
# Foreground: #f2f2e3 (off-white)
# Accent colors:
# - Yellow: #f9f972
# - Magenta: #ff00f6
# - Purple: #aa54f9
# - Blue: #55a8fb
# - Cyan: #00fbfd

# Terminal background: 75% transparent (0xBF alpha) to show wallpaper
background=#BF241b30

# Search apps on every keypress from start of line (no split character needed)
# app-launcher-always-search = true

# Apps to pin in the app bar (comma-separated display names, case-insensitive, order preserved)
# app-launcher-pinned-apps = WhatsApp, Telegram, Chrome

# Apps to hide from launcher search (comma-separated display names, case-insensitive)
# app-launcher-hidden-apps = YouTube, Google, Gmail

# Number of app buttons shown in the launcher bar (1-20, default 7)
# app-launcher-button-count = 7

# App search fuzzy match mode: balanced (default), strict, or loose
# app-launcher-search-mode = balanced

# Character that triggers app search when typed in the terminal (default %)
# app-launcher-input-char = %

# App bar size preset (0=smallest, 1=small, 2=default, 3=large)
# app-launcher-bar-height = 2

# Show app icons in black & white
# app-launcher-bw-icons = false

# Show A-Z scrub row for quick alphabetical scrolling
# app-launcher-az-row = false

# Double-tap A-Z row to lock the screen (requires Shizuku)
# app-launcher-az-double-tap-lock = false

# Extra keys - two rows
# Top row: TUI app launchers (send prefix + key -> tmux bindings)
# Bottom row: Standard tmux controls
extra-keys = [[ \
  {macro: "CTRL b BKSP", display: "🔥"}, \
  {macro: "CTRL b TAB", display: "🕞"}, \
  {macro: "CTRL b ESC", display: "🎧"}, \
  {macro: "CTRL b ENTER", display: "📂"}, \
  {macro: "CTRL b DEL", display: "🌠"}, \
  {macro: "CTRL b PGUP", display: "📒"}, \
  {macro: "CTRL b PGDN", display: "🗓️"}, \
  {macro: "CTRL b END", display: "🔍"} \
], [ \
  {macro: "ALT z", display: "⇄"}, \
  {macro: "CTRL b -", display: "𝍣", popup: {macro: "CTRL b |", display: "𝍬"}}, \
  {macro: "CTRL b 1", display: "⓵"}, \
  {macro: "CTRL b 2", display: "⓶"}, \
  {macro: "CTRL b 3", display: "⓷"}, \
  {macro: "CTRL b [", display: "✎"}, \
  {key: PASTE, popup: KEYBOARD}, \
  {macro: "CTRL b", display: "㋡"} \
]]

### Force black colors for drawer and dialogs
use-black-ui=true

### Hide keyboard or leave app (default) or escape.
back-key=back

### Horizontal (left/right) Margin
terminal-margin-horizontal=0

### Vertical (top/bottom) Margin
terminal-margin-vertical=0
background-overlay-color=#82141218
